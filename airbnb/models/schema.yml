models:
  - name: dim_listings_cleansed
    description: "Cleansed table which contains Airbnb listings."
    columns:
      - name: listing_id
        description: "Primary key for the listing"
        data_tests:
          - unique
          - not_null

      - name: host_id
        description: "The host's id. References the host table."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        description: "Type of the apartment / room"
        data_tests:
          - accepted_values:
              arguments:
                values:
                  [
                    "Entire home/apt",
                    "Private room",
                    "Shared room",
                    "Hotel room",
                  ]

      - name: minimum_nights
        description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
        data_tests:
          - positive_values
  
  - name: dim_listings_w_hosts
    data_tests: # 👈 Fixed key to data_tests
      - dbt_expectations.expect_table_row_count_to_equal_other_table: # 👈 Added space after the dash
          arguments: # 👈 Nested arguments block correctly
            compare_model: source('airbnb', 'listings')
    columns: # 👈 Added back the column validation tests for completeness
      - name: price
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: number
          - dbt_expectations.expect_column_quantile_values_to_be_between:
              arguments:
                # 👈 'column_type: number' was removed from here!
                quantile: .99
                min_value: 50
                max_value: 500
          - dbt_expectations.expect_column_max_to_be_between:
              arguments:
                max_value: 5000
              config:
                severity: warn

  - name: dim_hosts_cleansed
    description: "Cleansed dimensional table containing host details"
    columns:
      - name: host_id
        data_type: integer
        description: "The unique identifier for the host"
        data_tests:
          - not_null
          - unique

      - name: host_name
        data_type: string
        description: "The name of the host"
        data_tests:
          - not_null

      - name: is_superhost
        data_type: string
        description: "Flag indicating if the host is a superhost ('t' or 'f')"
        data_tests:
          - accepted_values:
              arguments:
                values: ["t", "f"]

  - name: fct_reviews
    columns:
      - name: listing_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_listings_cleansed')
                field: listing_id

      - name: reviewer_name
        data_tests:
          - not_null

      - name: review_sentiment
        data_tests:
          - accepted_values:
              arguments:
                values: ["positive", "neutral", "negative"]